name: Run vim-eof-comment
on:
  push:
    branches:
      - main
jobs:
  vim_eof_comment:
    name: vim-eof-comment
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
      - name: Install pipenv
        run: |
          python -m pip install -U pip
          pip install pipenv
      - name: Install vim-eof-comment
        run: |
          pipenv install --dev vim-eof-comment
      - name: Run vim-eof-comment
        run: |
          pipenv run vim-eof-comment -e lua,Makefile,yaml,yml,toml -i lua:2:Y -v .
          pipenv run vim-eof-comment -e md -nv .
      - name: Delete Pipenv
        run: |
          pipenv --rm
          rm -rf Pipfile Pipfile.lock .venv requirements.txt venv
      - name: Auto Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "chore: format files with `vim-eof-comment`"
          commit_options: "--signoff"
          branch: ${{ github.head_ref }}
